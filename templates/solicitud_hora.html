<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumenia</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/solicitud_hora.css') }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ChatGPT Image 31 may 2026, 04_40_27 a.m..png') }}">
</head>

<body>

    <header>
        <div class="left">
            <div class="menu-container">
                <div class="menu" id="menu">
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
            </div>

            <div class="brand">
                <h1 class="logo"><span class="green">L</span>umenia</h1>
            </div>
        </div>

        <div class="right">
            <ul>
                <li><a href="#"><i class="bi bi-bell"></i></a></li>
                <li><a href="#" id="open-modal"><i class="bi bi-person"></i></a></li>
            </ul>
        </div>
        
        <dialog class="dialog" id="modal">
            <button id="close-modal">
                <i class="bi bi-x"></i>
            </button>
            <div class="estilos">
                <ul>
                    <li><a href="#" class="zull">Iniciar sesión</a></li>
                    <li><a href="#" class="verdee">Crear cuenta</a></li>
                </ul>
            </div>
        </dialog>
        </header>

    <aside class="sidebar" id="sidebar">
        <nav>
            <ul>
                <li><a href="{{ url_for('inicio') }}"><i class="bi bi-house"></i><span>Inicio</span></a></li>
                <li><a href="{{ url_for('agendar') }}" class="selected"><i class="bi bi-envelope-plus"></i><span>Agendar Hora</span></a></li>
                <li><a href="{{ url_for('cancelar') }}"><i class="bi bi-envelope-dash"></i><span>Cancelar Hora</span></a></li>
                <li><a href="{{ url_for('horarios') }}"><i class="bi bi-calendar-event"></i><span>Horarios disponibles</span></a></li>
                <li><a href="{{ url_for('ayuda') }}"><i class="bi bi-chat"></i><span>Ayuda</span></a></li>
                <li><a href="{{ url_for('preguntas') }}"><i class="bi bi-patch-question"></i><span>Preguntas</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="container">
        <section class="solicitar-hora">

            <div class="solicitar-icono">
                <i class="bi bi-calendar-plus"></i>
            </div>

            <h2>Solicitar Hora con Psicólogo</h2>

            <p>
                Complete el siguiente formulario para solicitar una atención psicológica.
            </p>
            
            <form class="formulario-solicitud" id="formulario-solicitud" action="{{ url_for('guardar') }}" method="POST">

                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo" required>
                </div>

                <div class="campo">
                    <label for="curso">Curso</label>
                    <input type="text" id="curso" name="curso" placeholder="Ej: 3° Medio A" required>
                </div>

                <div class="campo">
                    <label for="correo">Correo institucional</label>
                    <input type="email" id="correo" name="correo" placeholder="correo@liceo.cl" required>
                </div>

                <div class="campo">
                    <label for="fecha">Fecha solicitada</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="campo">
                    <label for="motivo">Motivo de la solicitud</label>
                    <textarea id="motivo" name="motivo" rows="5" placeholder="Explique brevemente el motivo de la atención" required></textarea>
                </div>

                <button type="submit" class="btn-solicitar">
                    <i class="bi bi-send"></i>
                    Enviar Solicitud
                </button>

            </form>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script src="{{ url_for('static', filename='js/solicitud_hora.js') }}"></script>
</body>

</html>
